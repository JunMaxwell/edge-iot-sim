name: Build & Push Simulator

on:
  push:
    branches:
      - main
    paths:
      - "apps/simulator/**"
      - "packages/**"
      - ".github/workflows/build-simulator.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/simulator/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/edge-iot-simulator:latest
