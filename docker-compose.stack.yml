services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: iot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-internal

  mongo:
    image: mongo:7.0
    container_name: iot-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    volumes:
      - mongo_data:/data/db
    networks:
      - iot-internal

  api:
    image: ghcr.io/junmaxwell/edge-iot-api:latest
    container_name: iot-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/iot?authSource=admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - iot-internal

  simulator:
    image: ghcr.io/junmaxwell/edge-iot-simulator:latest
    container_name: iot-simulator
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      EMIT_INTERVAL_MS: ${EMIT_INTERVAL_MS:-500}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - iot-internal

networks:
  iot-internal:
    driver: bridge

volumes:
  rabbitmq_data:
  mongo_data:
