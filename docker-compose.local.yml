services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: iot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI at http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-internal

  mongo:
    image: mongo:7.0
    container_name: iot-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-root}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - iot-internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: iot-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3003}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASS:-root}@mongo:27017/iot?authSource=admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - iot-internal

  simulator:
    build:
      context: .
      dockerfile: apps/simulator/Dockerfile
    container_name: iot-simulator
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      EMIT_INTERVAL_MS: ${EMIT_INTERVAL_MS:-500}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - iot-internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked in at build time — must match where the
        # browser (not Docker) reaches the API from the host machine.
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    container_name: iot-web
    restart: unless-stopped
    ports:
      - "3003:3003"
    depends_on:
      - api
    networks:
      - iot-internal

networks:
  iot-internal:
    driver: bridge

volumes:
  rabbitmq_data:
  mongo_data:
